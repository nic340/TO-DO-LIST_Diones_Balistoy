<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
</head>
<body>
    <h1>To-Do List</h1>
    <ul>
    {% for task in tasks %}
        <li>{{ task }}</li>
    {% endfor %}
    </ul>
    <form action="/add" method="post">
        <input type="text" name="task" required>
        <button type="submit">Add</button>
    </form>
</body>
</html>
